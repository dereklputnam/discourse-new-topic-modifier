rules:
  refresh: true
  default: []
  type: objects
  schema:
    name: New Rule
    identifier: id
    properties:
      id:
        type: string
        required: true
        validations:
          min_length: 3
      enabled:
        type: boolean
      enabled_groups:
        type: groups
        required: true
        validations:
          min: 1
      selected_categories:
        type: categories
      include_subcategories:
        type: boolean
      button_text:
        type: string
        description: "Optional custom text for the button. Leave empty to keep default."
      icon:
        type: enum
        default: ""
        choices:
          - "default"
          - "pencil"
          - "plus"
          - "lock"
          - "ban"
          - "circle-info"
          - "envelope"
          - "flag"
          - "shield-halved"
          - "triangle-exclamation"
          - "wrench"
      tooltip_message:
        type: string
        required: true
        textarea: true
        description: "Supports Markdown links: [link text](https://example.com)"
        validations:
          min_length: 5
          max_length: 500
